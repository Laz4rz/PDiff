# Launch (single allocation, pooled GPUs):
# bash examples/gidd/submit_star_graph_gidd_pooled_slurm.sh --config-name gidd_star_graph_all_datasets_pu_seed_sweep
defaults:
  - config
  - override /data: star_graph
  - override /model: tiny
  - override /algo: gidd
  - override /strategy: single-device
  - override /lr_scheduler: constant_warmup
  - override hydra/launcher: submitit_local
  - _self_

# Use a plain key (dataset_id) instead of a config-group override so pooled
# frozen config snapshots can still apply per-run overrides safely.
dataset_id: d3p3n50
dataset_profiles:
  d3p3n50:
    train_file: deg_3_path_3_nodes_50_reverse_False_200000_train.txt
    validation_file: deg_3_path_3_nodes_50_reverse_False_20000_test.txt
    model_length: 50
  d5p3n50:
    train_file: deg_5_path_3_nodes_50_train_200000.txt
    validation_file: deg_5_path_3_nodes_50_test_20000.txt
    model_length: 74
  d2p5n50:
    train_file: deg_2_path_5_nodes_50_train_200000.txt
    validation_file: deg_2_path_5_nodes_50_test_20000.txt
    model_length: 68
  d2p2n50:
    train_file: deg_2_path_2_nodes_50_train_200000.txt
    validation_file: deg_2_path_2_nodes_50_test_20000.txt
    model_length: 23

launch_preset: local
launch_presets:
  local:
    max_batch_size: 2
    timeout_min: 240
    cpus_per_task: 8
    gpus_per_node: 1
    tasks_per_node: 1
    mem_gb: null
  slurm:
    max_batch_size: 32
    timeout_min: 240
    cpus_per_task: 8
    gpus_per_node: 1
    tasks_per_node: 1
    mem_gb: 32

pooled_slurm:
  job_name: gidd-star-pool-all-datasets
  time_limit: "04:00:00"
  cpus_per_task: 16
  gpus_per_node: 4
  mem_gb: 128
  partition: normal
  account: a137
  qos: null
  constraint: null
  slurm_environment: uni-d2
  sbatch_log_dir: outputs/slurm_logs
  sweep_max_parallel: ${.gpus_per_node}
  sweep_gpus: null
  sweep_limit: null
  sweep_dir: null
  cache_root: ${oc.env:SLURM_TMPDIR,/tmp}/discrete_diffusion
  wandb_token_file: /users/mboronski/.secrets/wandb_token

algo:
  loss_type: gidd_constant_pi
  loss_weighting: clip
  min_loss_weight: 0.0
  max_loss_weight: 1.0

trainer:
  deterministic: true
  num_nodes: 1
  devices: 1
  enable_progress_bar: false
  enable_model_summary: false
  max_epochs: 100
  max_steps: -1
  log_every_n_steps: 25
  val_check_interval: 500
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  precision: bf16-mixed

loader:
  global_batch_size: 256
  batch_size: 256
  eval_batch_size: 512
  num_workers: 8

training:
  torch_compile: false

lr_log10: -3.0

data:
  tokenizer_name_or_path: ascii-char
  dataset_config:
    data_dir: ${hydra:runtime.cwd}/data/star
    train_file: ${dataset_profiles.${dataset_id}.train_file}
    validation_file: ${dataset_profiles.${dataset_id}.validation_file}

model:
  length: ${dataset_profiles.${dataset_id}.model_length}
  max_tokens: -1
  dropout: 0.0

optim:
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.99
  eps: 1e-9

callbacks:
  checkpoint_every_n_steps:
    save_top_k: 0
    save_last: false
  checkpoint_monitor:
    monitor: val/nll
    save_top_k: 1
    save_last: true

eval:
  generate_samples: false
  run_validation_at_train_end: false

checkpointing:
  resume_from_ckpt: false
  clean_artifacts: true

wandb:
  project: star_graph_gidd_pu_seed_sweep_all_datasets
  save_dir: ${hydra:runtime.cwd}/wandb_logs
  group: ${dataset_id}-pu-seed-e${trainer.max_epochs}-lr${optim.lr}
  job_type: pu-seed-sweep
  name: ${dataset_id}-s${seed}-pu${algo.p_uniform}-lr${optim.lr}-e${trainer.max_epochs}

logging:
  print_config: false

hydra:
  mode: MULTIRUN
  verbose: false
  sweep:
    dir: ./outputs/sweeps/star_all_datasets_pu_seed/${now:%Y.%m.%d}/${now:%H%M%S}
  hydra_logging:
    root:
      level: ERROR
  job_logging:
    root:
      level: ERROR
    loggers:
      wandb:
        level: INFO
      wandb.sdk:
        level: INFO
      lightning:
        level: ERROR
      pytorch_lightning:
        level: ERROR
  sweeper:
    max_batch_size: ${launch_presets.${launch_preset}.max_batch_size}
    params:
      # Sweep across all four star-graph variants.
      dataset_id: d3p3n50,d5p3n50,d2p5n50,d2p2n50
      algo.p_uniform: 0,1
      seed: 1,2,3
  launcher:
    timeout_min: ${launch_presets.${launch_preset}.timeout_min}
    cpus_per_task: ${launch_presets.${launch_preset}.cpus_per_task}
    gpus_per_node: ${launch_presets.${launch_preset}.gpus_per_node}
    tasks_per_node: ${launch_presets.${launch_preset}.tasks_per_node}
    mem_gb: ${launch_presets.${launch_preset}.mem_gb}
