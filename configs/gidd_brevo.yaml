# Launch:
# .venv/bin/python -m discrete_diffusion --config-name gidd_brevo
defaults:
  - config
  - override /data: brevo
  - override /model: tiny
  - override /algo: gidd
  - override /strategy: single-device
  - override /lr_scheduler: constant_warmup
  - _self_

data:
  streaming: True
  tokenizer_name_or_path: brevo-dummy
  dataset_config:
    training_samples: 200000
    evaluation_samples: 20000
    graph_N: 20
    enforce_n_for_training: False
    multi_token: False

algo:
  loss_type: gidd_constant_pi
  loss_weighting: clip
  min_loss_weight: 0.0
  max_loss_weight: 1.0

trainer:
  deterministic: true
  num_nodes: 1
  devices: 1
  enable_progress_bar: true
  enable_model_summary: false
  max_epochs: 1
  max_steps: -1
  log_every_n_steps: 1
  val_check_interval: 25
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  precision: bf16-mixed

loader:
  global_batch_size: 256
  batch_size: 256
  eval_batch_size: 512
  num_workers: 1

training:
  torch_compile: false

model:
  length: 256
  max_tokens: -1
  dropout: 0.0

optim:
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.99
  eps: 1e-9

callbacks:
  checkpoint_every_n_steps:
    save_top_k: 0
    save_last: false
  checkpoint_monitor:
    monitor: val/nll
    save_top_k: 1
    save_last: true

eval:
  generate_samples: false
  run_validation_at_train_end: false

checkpointing:
  save_dir: ${hydra:runtime.output_dir}
  resume_from_ckpt: false
  resume_ckpt_path: ${checkpointing.save_dir}/checkpoints/last.ckpt
  clean_artifacts: true
  clean_artifact_dirs:
    - ${checkpointing.save_dir}/checkpoints
    - ${hydra:runtime.output_dir}/samples
    - ${hydra:runtime.output_dir}/validation_samples

wandb:
  project: brevo_gidd
  save_dir: ${hydra:runtime.cwd}/wandb_logs
  group: brevo-gidd
  job_type: single-run
  name: brevo-s${seed}-lr${optim.lr}-pu${algo.p_uniform}

logging:
  print_config: false
