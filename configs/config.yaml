defaults:
  - _self_
  - /callbacks:
    - checkpoint_every_n_steps
    - checkpoint_monitor
    - learning_rate_monitor
    - final_metrics
    - sample_saver
  - /data: text8 
  - /model: small_candi
  - /noise: inverse-cdf
  - /lr_scheduler: constant_warmup
  - /strategy: ddp
  - /prior: none
  - /sampling: candi
  - /algo: candi

seed: 1
lr_log10: null  # If set (e.g. -4.0), uses optim.lr = 10 ** lr_log10.

# base directory for caching datasets and models 
scratch_dir: ${oc.env:DISCRETE_DIFFUSION_SCRATCH_DIR,${oc.env:HOME}/.cache/discrete_diffusion}
block_size: ${model.length}

neg_infinity_mode: large-finite  # large-finite / true-inf

loader:
  global_batch_size: 512
  eval_global_batch_size: ${.global_batch_size}
  # Note: batch_size and eval_batch_size are **per machine**
  batch_size: ${div_up:${.global_batch_size}, ${mul:${trainer.devices}, ${trainer.num_nodes}}}
  eval_batch_size: ${div_up:${.eval_global_batch_size}, ${mul:${trainer.devices}, ${trainer.num_nodes}}}
  num_workers: 12
  pin_memory: True

training:
  ema: 0.9999
  antithetic_sampling: True
  importance_sampling: False
  change_of_variables: False
  loss_precision: 'bf16'  # bf16, float32, float64
  finetune_path: ''
  torch_compile: false
  force_deterministic_algorithms: false
  resample: False
  sampling_eps: 1e-3
  sampling_eps_min: 1e-3
  sampling_eps_max: 1.0
  eval_nll: True
  fault_tolerant: true

eval:
  checkpoint_path: ''  # Used to evaluate a checkpoint after training.
  disable_ema: False
  compute_perplexity_on_sanity: False
  compute_generation_accuracy: True
  generation_accuracy_max_batches: 1
  generation_accuracy_steps: null
  generation_accuracy_eps: null
  run_validation_before_train: false
  generate_samples: True
  run_validation_at_train_end: true
  train_end_validation_ckpt_path: last
  train_end_validation_metrics_path: ${hydra:runtime.output_dir}/train_end_validation_metrics.json
  save_validation_samples: false
  generated_samples_path: ${hydra:runtime.output_dir}/samples.json
  results_json_path: null
  npz_path: null

optim:
  weight_decay: 0
  lr: ${lr_from_log10:${lr_log10},3e-4}
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8

trainer:
  accelerator: cuda
  num_nodes: 1
  devices: ${device_count:}
  accumulate_grad_batches: ${div_up:${loader.global_batch_size}, ${mul:${trainer.devices}, ${loader.batch_size}, ${trainer.num_nodes}}}
  gradient_clip_val: 1.0
  precision: 'bf16'
  num_sanity_val_steps: 2
  max_epochs: null
  max_steps: 1_000_000
  log_every_n_steps: 100
  limit_train_batches: 1.0   # train on full dataset, can be used to toggle quick run
  limit_val_batches: 1.0     # validate on full dataset, can be used to toggle quick run
  val_check_interval: 10000
  check_val_every_n_epoch: null
  deterministic: false

wandb:
  project: ${data.train}
  save_dir: null
  notes: null
  group: null
  job_type: null
  name: null
  id: null 
  tags:
    - ${data.train}
    - ${data.valid}
    - ${algo.name}

hydra:
  run:
    dir: ./outputs/${data.train}/${now:%Y.%m.%d}/${now:%H%M%S}
  job:
    chdir: true

checkpointing:
  # Use custom `save_dir` if, e.g., saving to S3 bucket, otherwise leave this parameter as is
  save_dir: ${hydra:runtime.output_dir}
  # Note: `checkpoints` path should correspond to `checkpoint_every_n_steps.dirpath`
  resume_from_ckpt: true
  resume_ckpt_path: ${.save_dir}/checkpoints/last.ckpt
  clean_artifacts: false
  clean_artifact_dirs:
    - ${.save_dir}/checkpoints
    - ${hydra:runtime.output_dir}/samples
    - ${hydra:runtime.output_dir}/validation_samples
