# Launch:
# .venv/bin/python -m discrete_diffusion --config-name gidd_brevo
defaults:
  - config
  - override /data: brevo
  - override /model: small
  - override /algo: ar
  - override /strategy: single-device
  - override /lr_scheduler: constant_warmup
  - _self_

data:
  streaming: True
  tokenizer_name_or_path: brevo-dummy
  dataset_config:
    training_samples: 6400000
    evaluation_samples: 20000
    graph_N: 10
    enforce_n_for_training: False
    multi_token: False
    force_regenerate: False
    cached_streaming: True
    cached_streaming_num_shards: 40

algo:
  loss_type: gidd_constant_pi
  time_conditioning: false
  p_uniform: 0.0
  loss_weighting: clip
  min_loss_weight: 0.1
  max_loss_weight: 1.0
  sampler:
    _target_: discrete_diffusion.sampling.gidd.GIDDSampler

sampling:
  steps: 128
  gidd_posterior_sampling: sample

trainer:
  deterministic: true
  num_nodes: 1
  devices: 1
  enable_progress_bar: true
  enable_model_summary: false
  max_epochs: 1
  max_steps: -1
  log_every_n_steps: 50
  val_check_interval: 500
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  precision: bf16-mixed

loader:
  global_batch_size: 256
  batch_size: 256
  eval_batch_size: 512
  num_workers: 4
  shuffle_train: false
  shuffle_valid: false

training:
  torch_compile: false

model:
  length: 128
  max_tokens: -1
  use_time_conditioning: false
  dropout: 0.0

optim:
  lr: 3e-4
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.99
  eps: 1e-9

lr_scheduler:
  num_warmup_steps: 100

callbacks:
  checkpoint_every_n_steps:
    save_top_k: 0
    save_last: false
  checkpoint_monitor:
    monitor: val/nll
    save_top_k: 1
    save_last: true

eval:
  generate_samples: false
  run_validation_at_train_end: false
  generation_accuracy_method: brevo_topo
  samplers:
    - name: ancestral
      sampler:
        _target_: discrete_diffusion.sampling.gidd.GIDDSampler
    - name: left_to_right
      sampler:
        _target_: discrete_diffusion.sampling.gidd.GIDDLeftToRightSampler
    - name: right_to_left
      sampler:
        _target_: discrete_diffusion.sampling.gidd.GIDDRightToLeftSampler
    - name: single_token
      sampler:
        _target_: discrete_diffusion.sampling.gidd.GIDDSingleTokenSampler
    - name: adaptive
      sampler:
        _target_: discrete_diffusion.sampling.gidd.GIDDAdaptiveSampler
  log_validation_completions: true
  log_validation_completions_max_samples: 8
  log_validation_completions_include_step: true
  log_validation_completions_summary_key: val/completions_latest

checkpointing:
  save_dir: ${hydra:runtime.output_dir}
  resume_from_ckpt: false
  resume_ckpt_path: ${checkpointing.save_dir}/checkpoints/last.ckpt
  clean_artifacts: true
  clean_artifact_dirs:
    - ${checkpointing.save_dir}/checkpoints
    - ${hydra:runtime.output_dir}/samples
    - ${hydra:runtime.output_dir}/validation_samples

wandb:
  project: brevo_compare_samplers
  save_dir: ${hydra:runtime.cwd}/wandb_logs
  group: brevo-compare
  job_type: single-run
  name: p${oc.select:algo.p_uniform,0}-m${model.name}-lr${optim.lr}-ts${data.dataset_config.training_samples}-N${data.dataset_config.graph_N}-bs${loader.batch_size}-s${seed}

logging:
  print_config: false
